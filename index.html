<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Animación de Pelota</title>

<style>

:root {
  --color-fondo: linear-gradient(135deg, #1e3c72, #2a5298);
  --color-caja: rgba(255,255,255,0.7);
}


body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: var(--color-fondo);
  font-family: Arial, sans-serif;
  color: white;
}


header {
  margin-bottom: 20px;
}

main {
  display: flex;
  justify-content: center;
  align-items: center;
}

.caja {
  width: 320px;
  height: 420px;
  border: 3px solid var(--color-caja);
  border-radius: 20px;
  position: relative;
  overflow: hidden;
}


.pelota {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  position: absolute;
  background: red;

  animation: movimiento 4s infinite linear,
             color 3s infinite,
             deformar 0.3s infinite;
}


@keyframes movimiento {
  0%   { top: 10px; left: 10px; }
  25%  { top: 350px; left: 250px; }
  50%  { top: 80px; left: 260px; }
  75%  { top: 320px; left: 30px; }
  100% { top: 10px; left: 10px; }
}

@keyframes color {
  0%   { background: red; }
  25%  { background: lime; }
  50%  { background: blue; }
  75%  { background: yellow; }
  100% { background: pink; }
}


@keyframes deformar {
  0%, 100% { transform: scale(1,1); }
  50% { transform: scale(1.2,0.8); }
}


.onda {
  position: absolute;
  width: 15px;
  height: 15px;
  border: 2px solid white;
  border-radius: 50%;
  opacity: 0;
  animation: expandir 2s infinite;
}

.onda1 { top: 0; left: 50%; }
.onda2 { bottom: 0; left: 30%; animation-delay: 0.5s; }
.onda3 { top: 50%; right: 0; animation-delay: 1s; }
.onda4 { top: 60%; left: 0; animation-delay: 1.5s; }

@keyframes expandir {
  0% {
    transform: scale(0.5);
    opacity: 0.7;
  }
  100% {
    transform: scale(5);
    opacity: 0;
  }
}


.caja:hover .pelota {
  animation-duration: 1.5s; 
}

.caja:hover {
  background: rgba(255,255,255,0.1);
}

</style>
</head>

<body>
    
<header>
  <h1>Pelota Rebotando</h1>
</header>

<main>
  <section class="caja">
    <div class="pelota"></div>

    <div class="onda onda1"></div>
    <div class="onda onda2"></div>
    <div class="onda onda3"></div>
    <div class="onda onda4"></div>
  </section>

</main>

</body>
</html>
